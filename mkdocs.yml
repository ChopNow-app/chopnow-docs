site_name: ChopNow Docs
site_description: Technical documentation for the ChopNow platform — architecture, decisions, runbooks, onboarding.
site_url: https://chopnow-app.github.io/chopnow-docs/
repo_url: https://github.com/ChopNow-app/chopnow-docs
repo_name: ChopNow-app/chopnow-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.instant       # SPA-style page loads
    - navigation.tracking      # update URL on scroll
    - navigation.tabs          # top-level sections as tabs
    - navigation.tabs.sticky   # keep tabs visible while scrolling
    - navigation.sections      # sub-sections in the sidebar
    - navigation.indexes       # section landing pages
    - navigation.top           # back-to-top button
    - toc.follow               # ToC follows reading position
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy        # copy-button on every code block
    - content.action.edit      # "edit on GitHub" link per page
    - content.tabs.link        # tab choices persist across pages
  # Palette uses scheme `custom` + overrides in stylesheets/chopnow.css to
  # carry Sugar Art Palier 4 colors (rouge/noir/blanc) rather than Material's
  # default named palettes (which only ship pre-mixed hues).
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Plus Jakarta Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/chopnow.css

markdown_extensions:
  - admonition                # note/warning/tip boxes
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details          # collapsible blocks
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Material icon + emoji shortcodes — required for `:material-rocket-launch:`
  # syntax used by the grid cards on the landing page and inline icons across
  # the docs. Without this, those tokens render as literal text.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ChopNow-app

nav:
  - Home: index.md
  - Getting started:
    - getting-started/overview.md
    - For developers: getting-started/onboarding-dev.md
    - For operators: getting-started/onboarding-non-dev.md
  - Architecture:
    - architecture/overview.md
    - Stack: architecture/stack.md
    - Infrastructure: architecture/infrastructure.md
    - Data model: architecture/data-model.md
    - Security: architecture/security.md
    - Observability: architecture/observability.md
    - API lifecycle: architecture/api-lifecycle.md
  - Vendor surface:
    - vendor/index.md
    - Onboarding & KYC: vendor/onboarding.md
    - Self-service surfaces: vendor/self-service.md
    - Order lifecycle: vendor/order-lifecycle.md
    - Pre-orders: vendor/pre-orders.md
    - Notifications: vendor/notifications.md
    - Concurrency model: vendor/concurrency.md
    - Data model: vendor/data-model.md
    - API reference: vendor/api-reference.md
    - Operational telemetry: vendor/operational.md
  - Decisions (ADRs):
    - decisions/index.md
    - "ADR-0001 PWA, not React Native": decisions/0001-pwa-not-react-native.md
    - "ADR-0002 Twilio, not Africa's Talking": decisions/0002-twilio-not-africas-talking.md
    - "ADR-0003 Hetzner, not AWS": decisions/0003-hetzner-not-aws.md
    - "ADR-0004 arm64 prod, amd64 staging": decisions/0004-arm64-prod-amd64-staging.md
    - "ADR-0005 Hybrid payouts, ledger-first finance": decisions/0005-payout-architecture.md
    - Template: decisions/template.md
  - Runbooks:
    - runbooks/index.md
    - Deploy to staging: runbooks/deploy-staging.md
    - Rollback: runbooks/rollback.md
    - Re-join Twilio sandbox: runbooks/twilio-sandbox-rejoin.md
    - Rotate DO API token: runbooks/rotate-do-token.md
    - External uptime monitoring: runbooks/uptime-monitoring.md
  - Reference:
    - Repositories: reference/repositories.md
    - Environments: reference/environments.md
    - Glossary: reference/glossary.md
