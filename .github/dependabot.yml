# Dependabot config — matches the cadence used in chopnow-api:
# weekly grouped minor/patch PRs + immediate security PRs.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # pip — mkdocs-material toolchain pinned in requirements.txt
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Africa/Douala
    target-branch: main
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      docs-deps:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # GitHub Actions in .github/workflows/
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    target-branch: main
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: ci
      include: scope
