# PR + push validation for chopnow-docs.
#
# What this catches BEFORE merging to main (where deploy-pages.yml fires):
#   - Broken Markdown that mkdocs parses but renders wrong
#   - Dead internal links (mkdocs --strict treats them as errors)
#   - Broken Mermaid frontmatter or unknown fence
#   - Missing nav targets (file deleted but still in mkdocs.yml nav)
#
# `mkdocs build --strict` exits non-zero on warnings — same gate the
# Pages deploy uses, so catching it here means we never publish a
# broken docs site.
#
# Runs on push to ANY branch except main (main publishes via
# deploy-pages.yml, no reason to double-check) and on every PR.

name: CI

on:
  workflow_dispatch:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Opt into Node.js 24 runtime for JavaScript actions BEFORE the June 2nd
# 2026 default flip. Removes the "Node.js 20 actions are deprecated"
# warnings from every run. Same env var on deploy-pages.yml + the other
# repos' workflows.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mkdocs-strict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install MkDocs Material toolchain
        run: pip install -r requirements.txt

      - name: Build docs (strict — warnings fail the build)
        run: mkdocs build --strict
