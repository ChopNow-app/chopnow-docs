name: Deploy docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Opt every JS action into Node 24 ahead of GitHub's June 2, 2026 forced
# migration. Removes the deprecation warning emitted by checkout@v4,
# configure-pages@v5, setup-python@v5, upload-pages-artifact@v3,
# deploy-pages@v4. Drop this line once those actions ship Node 24 builds.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Allow one in-flight publish at a time. Newer pushes cancel older ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs Material
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict
        # --strict turns warnings into errors so broken nav links or missing
        # files fail the build instead of shipping a broken docs site.

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
